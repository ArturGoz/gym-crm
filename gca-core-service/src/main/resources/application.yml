server:
  port: 8080

spring:
  application:
    name: gca-core-service
  profiles:
    active: dev
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  activemq:
    broker-url: ${ACTIVEMQ_BROKER_URL}
    user: ${ACTIVEMQ_USER}
    password: ${ACTIVEMQ_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    changelog: classpath:db/changelog/db.changelog-master.xml
    enabled: true

jms:
  queue:
    trainer-workload: trainer.workload.queue
  request-timeout-ms: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

gca:
  metrics:
    max-memory-threshold: 2000

jwt:
  secret: ${JWT_SECRET}
  access:
    duration: 3600000
  refresh:
    duration: 604800000

login:
  attempt:
    max: 3
    block-time-ms: 60000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka